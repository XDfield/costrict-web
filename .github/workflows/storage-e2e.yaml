name: Storage E2E

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/storage-e2e.yaml"
      - "server/cmd/api/**"
      - "server/cmd/migrate/**"
      - "server/cmd/worker/**"
      - "server/internal/database/**"
      - "server/internal/handlers/**"
      - "server/internal/models/**"
      - "server/internal/services/**"
      - "server/internal/storage/**"
      - "server/migrations/**"
      - "server/test/storage-e2e/**"
      - "server/go.mod"
      - "server/go.sum"
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/storage-e2e.yaml"
      - "server/cmd/api/**"
      - "server/cmd/migrate/**"
      - "server/cmd/worker/**"
      - "server/internal/database/**"
      - "server/internal/handlers/**"
      - "server/internal/models/**"
      - "server/internal/services/**"
      - "server/internal/storage/**"
      - "server/migrations/**"
      - "server/test/storage-e2e/**"
      - "server/go.mod"
      - "server/go.sum"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: storage-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  storage-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run S3 storage E2E
        run: bash server/test/storage-e2e/run.sh
