{{/*
Chart-managed Secret for cs-user runtime credentials.

Rendered only when .Values.secrets.create=true. Useful for dev / staging /
CI where the operator is fine checking plaintext into Helm values. For
production, leave secrets.create=false (the default) and provision the
Secret externally (sealed-secrets, external-secrets, kubectl create secret,
etc.) — then point database.existingSecret / internalToken.existingSecret
at it. The Deployment template resolves the secret name through the same
chart-managed name when secrets.create=true and the operator hasn't
overridden existingSecret, so both flows produce identical pod env.
*/}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.Version }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  {{/* database password key — must match database.existingSecretKey */}}
  {{ .Values.database.existingSecretKey | default "password" }}: {{ .Values.secrets.databasePassword | quote }}
  {{/* internal token key — must match internalToken.existingSecretKey */}}
  {{ .Values.internalToken.existingSecretKey | default "internal-token" }}: {{ .Values.secrets.internalToken | quote }}
{{- end }}
