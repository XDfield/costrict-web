{{- $artifactBackend := .Values.artifactStorage.backend | default "local" -}}
{{- if not (has $artifactBackend (list "local" "s3")) -}}
{{- fail (printf "artifactStorage.backend must be one of local or s3, got %q" $artifactBackend) -}}
{{- end -}}
{{- if eq $artifactBackend "local" -}}
{{- $_ := required "artifactStorage.local.existingClaim is required when artifactStorage.backend=local" .Values.artifactStorage.local.existingClaim -}}
{{- else -}}
{{- $_ := required "artifactStorage.s3.endpoint is required when artifactStorage.backend=s3" .Values.artifactStorage.s3.endpoint -}}
{{- $_ := required "artifactStorage.s3.bucket is required when artifactStorage.backend=s3" .Values.artifactStorage.s3.bucket -}}
{{- $_ := required "artifactStorage.s3.region is required when artifactStorage.backend=s3" .Values.artifactStorage.s3.region -}}
{{- $_ := required "artifactStorage.s3.existingSecret is required when artifactStorage.backend=s3" .Values.artifactStorage.s3.existingSecret -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.Version }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/config: {{ toJson .Values.config | sha256sum }}
        checksum/artifact-storage: {{ toJson .Values.artifactStorage | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: default
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: CONCURRENCY
              value: {{ .Values.config.concurrency | quote }}
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: DB_USER
              value: {{ .Values.database.user | quote }}
            {{- if .Values.database.existingSecret }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey }}
            {{- end }}
            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            {{- if .Values.redis.existingSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: {{ .Values.redis.existingSecretKey }}
            {{- end }}
            - name: ARTIFACT_STORAGE_BACKEND
              value: {{ $artifactBackend | quote }}
            {{- if eq $artifactBackend "local" }}
            - name: ARTIFACT_STORAGE_PATH
              value: {{ .Values.artifactStorage.local.mountPath | quote }}
            {{- else }}
            - name: S3_ENDPOINT
              value: {{ .Values.artifactStorage.s3.endpoint | quote }}
            - name: S3_BUCKET
              value: {{ .Values.artifactStorage.s3.bucket | quote }}
            - name: S3_REGION
              value: {{ .Values.artifactStorage.s3.region | quote }}
            - name: S3_FORCE_PATH_STYLE
              value: {{ .Values.artifactStorage.s3.forcePathStyle | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.artifactStorage.s3.existingSecret }}
                  key: {{ .Values.artifactStorage.s3.accessKeySecretKey }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.artifactStorage.s3.existingSecret }}
                  key: {{ .Values.artifactStorage.s3.secretKeySecretKey }}
            {{- if .Values.artifactStorage.s3.sessionTokenSecretKey }}
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.artifactStorage.s3.existingSecret }}
                  key: {{ .Values.artifactStorage.s3.sessionTokenSecretKey }}
            {{- end }}
            - name: AWS_REQUEST_CHECKSUM_CALCULATION
              value: "when_required"
            - name: AWS_RESPONSE_CHECKSUM_VALIDATION
              value: "when_required"
            {{- if .Values.artifactStorage.s3.ca.existingSecret }}
            - name: S3_CA_FILE
              value: {{ printf "%s/%s" (trimSuffix "/" .Values.artifactStorage.s3.ca.mountPath) .Values.artifactStorage.s3.ca.key | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or (eq $artifactBackend "local") (and (eq $artifactBackend "s3") .Values.artifactStorage.s3.ca.existingSecret) }}
          volumeMounts:
            {{- if eq $artifactBackend "local" }}
            - name: artifacts-storage
              mountPath: {{ .Values.artifactStorage.local.mountPath }}
            {{- end }}
            {{- if and (eq $artifactBackend "s3") .Values.artifactStorage.s3.ca.existingSecret }}
            - name: artifact-storage-ca
              mountPath: {{ .Values.artifactStorage.s3.ca.mountPath }}
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or (eq $artifactBackend "local") (and (eq $artifactBackend "s3") .Values.artifactStorage.s3.ca.existingSecret) }}
      volumes:
        {{- if eq $artifactBackend "local" }}
        - name: artifacts-storage
          persistentVolumeClaim:
            claimName: {{ .Values.artifactStorage.local.existingClaim }}
        {{- end }}
        {{- if and (eq $artifactBackend "s3") .Values.artifactStorage.s3.ca.existingSecret }}
        - name: artifact-storage-ca
          secret:
            secretName: {{ .Values.artifactStorage.s3.ca.existingSecret }}
            items:
              - key: {{ .Values.artifactStorage.s3.ca.key }}
                path: {{ .Values.artifactStorage.s3.ca.key }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
