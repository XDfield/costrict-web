host: localhost:8080
info:
  contact:
    name: CoStrict Team
    url: https://costrict.ai
  description: AI Agent Platform API - Skill marketplace, repository and registry
    management.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Costrict Web API
  version: "1.0"
paths:
  /admin/notification-channels:
    get:
      description: Get all system notification channels (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              channels:
                items:
                  $ref: '#/definitions/github_com_costrict_costrict-web_server_internal_models.SystemNotificationChannel'
                type: array
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: List system notification channels
      tags:
      - admin/notification-channels
    post:
      consumes:
      - application/json
      description: Create a new system notification channel (admin only)
      parameters:
      - description: Channel data
        in: body
        name: body
        required: true
        schema:
          properties:
            name:
              type: string
            systemConfig:
              type: object
            type:
              type: string
            workspaceId:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            properties:
              channel:
                $ref: '#/definitions/github_com_costrict_costrict-web_server_internal_models.SystemNotificationChannel'
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Create system notification channel
      tags:
      - admin/notification-channels
  /admin/notification-channels/{id}:
    delete:
      description: Delete a system notification channel (admin only)
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              success:
                type: boolean
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Delete system notification channel
      tags:
      - admin/notification-channels
    put:
      consumes:
      - application/json
      description: Update a system notification channel (admin only)
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: string
      - description: Update data
        in: body
        name: body
        required: true
        schema:
          properties:
            enabled:
              type: boolean
            name:
              type: string
            systemConfig:
              type: object
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              channel:
                $ref: '#/definitions/github_com_costrict_costrict-web_server_internal_models.SystemNotificationChannel'
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Update system notification channel
      tags:
      - admin/notification-channels
  /admin/system-roles:
    get:
      description: List members by target system role (platform admin only)
      parameters:
      - description: Role
        in: query
        name: role
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              role:
                type: string
              users:
                items:
                  type: object
                type: array
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List users by system role
      tags:
      - admin/system-roles
  /admin/system-roles/users/{userId}:
