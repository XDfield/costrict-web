name: Build Staging Images

# Manual-only build pipeline for the test environment.
#
# Differences vs build-images.yaml (the production / release pipeline):
#
#   1. Trigger          — workflow_dispatch ONLY. No tag/push trigger,
#                         no scheduled run. Nothing can fire this except
#                         a human in the UI / via gh CLI.
#   2. Image tag         — derived from the source branch + commit SHA,
#                         so every build is uniquely identifiable and
#                         traceable back to the exact source. Format:
#                           staging-<branch-slug>-<short-sha>
#                         e.g.  staging-feat-catalog-ingest-9b5fa6d
#   3. NO mutable tags   — does NOT push `latest`, `staging`, or any
#                         other rolling alias. Each image lives at its
#                         immutable per-build tag only. Helm rollback
#                         is trivial because every previous build is
#                         still pinnable.
#   4. NO chart release — does not touch release-charts.yaml's flow.
#                         No GitHub Release is created. Chart upgrades
#                         on staging use the existing release-charts
#                         release line (or the chart files checked out
#                         locally on the bastion).
#   5. Services         — default api,worker. Portal is opt-in because
#                         portal-side staging builds require a matching
#                         portal submodule branch and are usually a
#                         separate concern.
#
# How operators consume this:
#
#   1. Run this workflow (UI: Actions → Build Staging Images → Run workflow,
#      or `gh workflow run build-staging-images.yaml --ref <branch>` —
#      remember the --ref because it picks BOTH the workflow file version
#      AND the source code being built).
#   2. The Run Summary tail prints the image tag + a one-liner
#      `helm upgrade … --set image.tag=<tag>` for each service. Copy that
#      into the bastion runbook.
#   3. Pin staging Helm release to that specific tag. No production
#      deployment will ever pick this image because:
#       - no `latest` was overwritten
#       - no Release was published
#       - the immutable tag is unmistakably 'staging-…'

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Source branch to build (must already be pushed to origin)"
        required: true
        default: "main"
        type: string
      services:
        description: "Comma-separated services (gateway,api,worker,portal). Default: api,worker"
        required: false
        default: "api,worker"
        type: string
      portal_branch:
        description: "Branch to checkout inside the portal submodule (only used when services includes portal)"
        required: false
        default: "dev"
        type: string

env:
  REGISTRY: ghcr.io/xdfield
  DOCKER_BUILDKIT: 1

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}
      image_tag: ${{ steps.compute-tag.outputs.image_tag }}
      branch_slug: ${{ steps.compute-tag.outputs.branch_slug }}
      short_sha: ${{ steps.compute-tag.outputs.short_sha }}
      source_ref: ${{ steps.source-ref.outputs.source_ref }}
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 1

      - name: Record source ref
        id: source-ref
        run: |
          echo "source_ref=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      # The image tag has to be deterministic from (branch, commit) and
      # has to be docker-tag-safe: only [A-Za-z0-9._-] and <=128 chars.
      # We slugify the branch (lowercase, slash→dash, strip everything
      # else) and append the first 7 chars of the commit SHA.
      - name: Compute image tag
        id: compute-tag
        run: |
          BRANCH="${{ inputs.branch }}"
          # Lowercase, slash→dash, drop everything that isn't a-z0-9._-.
          SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's|/|-|g' | sed 's|[^a-z0-9._-]||g')
          # Trim to 50 chars so the final tag stays well under docker's 128 limit.
          SLUG=$(echo "$SLUG" | cut -c1-50)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          IMAGE_TAG="staging-${SLUG}-${SHORT_SHA}"
          echo "branch_slug=$SLUG"      >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA"   >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG"   >> $GITHUB_OUTPUT
          echo "Resolved image tag: $IMAGE_TAG"

      - name: Set services to build
        id: set-services
        run: |
          INPUT="$(echo '${{ inputs.services }}' | tr '[:upper:]' '[:lower:]' | tr -d ' ')"
          if [ -z "$INPUT" ]; then
            INPUT="api,worker"
          fi
          # Validate every requested service is in the allowed set; reject
          # 'all' and anything we don't recognise so dispatch typos can't
          # silently expand into building portal/gateway when only api was
          # intended.
          OUT="["
          first=1
          for svc in $(echo "$INPUT" | tr ',' ' '); do
            case "$svc" in
              gateway|api|worker|portal) : ;;
              all) echo "::error::'all' not allowed on staging — list services explicitly"; exit 1 ;;
              *)   echo "::error::Unknown service '$svc' (allowed: gateway,api,worker,portal)"; exit 1 ;;
            esac
            if [ $first -eq 1 ]; then first=0; else OUT="$OUT,"; fi
            OUT="$OUT\"$svc\""
          done
          OUT="$OUT]"
          echo "services=$OUT" >> $GITHUB_OUTPUT
          echo "Services to build: $OUT"

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.services) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          submodules: recursive

      - name: Update portal submodule to target branch
        if: matrix.service == 'portal'
        run: |
          BRANCH="${{ inputs.portal_branch }}"
          cd portal
          git fetch origin "+refs/heads/${BRANCH}:refs/remotes/origin/${BRANCH}"
          git checkout -B "${BRANCH}" "origin/${BRANCH}"
          echo "portal submodule branch: ${BRANCH}"
          echo "portal submodule commit: $(git rev-parse HEAD)"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image build context
        id: image
        run: |
          case "${{ matrix.service }}" in
            gateway)
              CONTEXT="./gateway"
              DOCKERFILE="./gateway/Dockerfile"
              IMAGE_NAME="costrict-web-gateway"
              ;;
            api)
              CONTEXT="./server"
              DOCKERFILE="./server/Dockerfile"
              IMAGE_NAME="costrict-web-api"
              ;;
            worker)
              CONTEXT="./server"
              DOCKERFILE="./server/Dockerfile.worker"
              IMAGE_NAME="costrict-web-worker"
              ;;
            portal)
              CONTEXT="./portal"
              DOCKERFILE="./portal/packages/app-ai-native/Dockerfile"
              IMAGE_NAME="costrict-web-portal"
              ;;
          esac
          echo "context=$CONTEXT"        >> $GITHUB_OUTPUT
          echo "dockerfile=$DOCKERFILE"  >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME"  >> $GITHUB_OUTPUT

      - name: Build args (portal only)
        id: build_args
        run: |
          if [ "${{ matrix.service }}" = "portal" ]; then
            echo "args=VITE_API_PREFIX=/costrict-web-api" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      # Single tag, immutable per-build. NO `latest`. NO `staging` alias.
      # This is the critical safety property of this workflow vs
      # build-images.yaml — every production-affecting tag stays pristine.
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.image.outputs.context }}
          file: ${{ steps.image.outputs.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}:${{ needs.prepare.outputs.image_tag }}
          build-args: ${{ steps.build_args.outputs.args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Per-image summary
        run: |
          {
            echo "### ${{ matrix.service }}"
            echo ""
            echo "- **Image:** \`${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}:${{ needs.prepare.outputs.image_tag }}\`"
            echo "- **Source commit:** \`${{ needs.prepare.outputs.source_ref }}\` (branch \`${{ inputs.branch }}\`)"
          } >> $GITHUB_STEP_SUMMARY

  summary:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Compose deploy-ready summary
        run: |
          IMG_TAG="${{ needs.prepare.outputs.image_tag }}"
          {
            echo "## Staging build summary"
            echo ""
            echo "**Image tag:** \`$IMG_TAG\`"
            echo "**Source branch:** \`${{ inputs.branch }}\` @ \`${{ needs.prepare.outputs.source_ref }}\`"
            echo ""
            echo "### Built images"
            echo ""
            echo '${{ needs.prepare.outputs.services }}' | jq -r '.[]' | while read svc; do
              case "$svc" in
                gateway) IMG=costrict-web-gateway ;;
                api)     IMG=costrict-web-api ;;
                worker)  IMG=costrict-web-worker ;;
                portal)  IMG=costrict-web-portal ;;
              esac
              echo "- \`${{ env.REGISTRY }}/$IMG:$IMG_TAG\`"
            done
            echo ""
            echo "### Properties (vs build-images.yaml)"
            echo ""
            echo "- ❌ \`latest\` NOT overwritten"
            echo "- ❌ No GitHub Release created"
            echo "- ❌ No \`staging\` rolling tag — each build is immutable"
            echo "- ✅ Tag is reversible: any prior staging build can be re-deployed by setting image.tag back"
            echo ""
            echo "### Deploy on bastion"
            echo ""
            echo '```bash'
            echo "# Inside the bastion that can kubectl the staging cluster:"
            echo "IMAGE_TAG=$IMG_TAG ENVIRONMENT=staging bash scripts/helm-upgrade.sh"
            echo ""
            echo "# Or one-liner per service:"
            echo '${{ needs.prepare.outputs.services }}' | jq -r '.[]' | while read svc; do
              echo "helm -n costrict-web upgrade $svc deploy/charts/$svc --reuse-values --set image.tag=$IMG_TAG"
            done
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
