{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    # Allow only pods in the same namespace labeled as costrict-web consumers
    # (defense in depth on top of the X-Internal-Token shared secret).
    - from:
        - podSelector:
            matchExpressions:
              - key: costrict.io/cs-user-consumer
                operator: In
                values: ["true"]
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
{{- end }}
