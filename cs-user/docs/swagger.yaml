basePath: /
definitions:
  github_com_costrict_costrict-web_cs-user_internal_auth.JWK:
    properties:
      alg:
        description: 'algorithm: "RS256"'
        type: string
      e:
        description: RSA exponent, base64url-no-pad
        type: string
      kid:
        description: 'key id: RFC 7638 thumbprint'
        type: string
      kty:
        description: 'key type: "RSA"'
        type: string
      "n":
        description: RSA modulus, base64url-no-pad
        type: string
      use:
        description: 'public key use: "sig"'
        type: string
    type: object
  github_com_costrict_costrict-web_cs-user_internal_auth.JWKS:
    properties:
      keys:
        items:
          $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_auth.JWK'
        type: array
    type: object
  github_com_costrict_costrict-web_cs-user_internal_models.BindIdentityOptions:
    properties:
      force_rebind:
        type: boolean
    type: object
  github_com_costrict_costrict-web_cs-user_internal_models.JWTClaims:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      owner:
        type: string
      phone:
        type: string
      picture:
        type: string
      preferred_username:
        type: string
      provider:
        type: string
      provider_user_id:
        type: string
      sub:
        type: string
      universal_id:
        type: string
    type: object
  github_com_costrict_costrict-web_cs-user_internal_models.User:
    properties:
      auth_provider:
        type: string
      avatar_url:
        type: string
      casdoor_id:
        type: string
      casdoor_sub:
        type: string
      casdoor_universal_id:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      external_key:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      last_login_at:
        type: string
      last_sync_at:
        type: string
      organization:
        type: string
      phone:
        type: string
      provider_user_id:
        type: string
      status:
        type: string
      subject_id:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  github_com_costrict_costrict-web_cs-user_internal_models.UserAuthIdentity:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      explicitly_unbound:
        type: boolean
      external_key:
        type: string
      external_subject:
        type: string
      external_user_id:
        type: string
      id:
        type: integer
      is_primary:
        type: boolean
      issuer:
        type: string
      last_login_at:
        type: string
      organization:
        type: string
      phone:
        type: string
      provider:
        type: string
      provider_user_id:
        type: string
      updated_at:
        type: string
      user_subject_id:
        type: string
    type: object
  internal_handlers.applyEnterpriseMappingRequest:
    properties:
      provider:
        type: string
      tenant_id:
        type: string
      user_subject_id:
        type: string
    required:
    - provider
    - user_subject_id
    type: object
  internal_handlers.bindIdentityRequest:
    properties:
      claims:
        $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.JWTClaims'
      options:
        $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.BindIdentityOptions'
    required:
    - claims
    type: object
  internal_handlers.byIDsRequest:
    properties:
      ids:
        items:
          type: string
        maxItems: 500
        minItems: 1
        type: array
    required:
    - ids
    type: object
  internal_handlers.reissueTokenRequest:
    properties:
      audience:
        description: |-
          Audience overrides the configured default. Empty slice falls back
          to JWTConfig.DefaultAudience; populated slice replaces it.
        items:
          type: string
        type: array
      identity:
        allOf:
        - $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.JWTClaims'
        description: |-
          Identity carries the parsed Casdoor JWT claims. Optional — when nil,
          only standard JWT claims + enterprise claims (if any) are emitted.
          Typical Phase A7 callers always pass Identity; the nil path exists
          for refresh-token flows (Phase B) where identity may be cached.
      tenant_id:
        description: |-
          TenantID is reserved for Phase B. Phase A callers pass "default" or
          leave empty; the service falls back to "default".
        type: string
      user_subject_id:
        description: UserSubjectID is the cs-user user's stable subject_id. Required.
        type: string
    required:
    - user_subject_id
    type: object
  internal_handlers.reissueTokenResponse:
    properties:
      expires_at:
        type: string
      token:
        type: string
    type: object
  internal_handlers.transferIdentityRequest:
    properties:
      external_key:
        type: string
      source_user_subject_id:
        description: |-
          SourceUserSubjectID is accepted for forwards compatibility with
          server's signature; cs-user identifies the identity purely by
          external_key.
        type: string
      target_user_subject_id:
        type: string
    required:
    - external_key
    - target_user_subject_id
    type: object
host: localhost:8081
info:
  contact: {}
  description: 'User identity service for the costrict-cloud platform (Phase 1: user
    CRUD + read-through RPC).'
  title: cs-user API
  version: "1.0"
paths:
  /.well-known/jwks:
    get:
      description: Exposes cs-user's RSA public signing key(s) so relying parties
        (server) can verify cs-user-issued JWTs. Public — RFC 7517 permits; public
        keys aren't secrets. Returns 503 when signing is not configured (CS_USER_JWT_SIGNING_KEY_PATH
        unset).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_auth.JWKS'
        "503":
          description: Service Unavailable
          schema:
            properties:
              error:
                type: string
            type: object
      summary: JWKS endpoint
      tags:
      - jwks
  /api/internal/ping:
    get:
      description: Returns pong. Used by costrict-web to verify the X-Internal-Token
        handshake at startup. Requires the shared secret.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              pong:
                type: boolean
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Internal handshake
      tags:
      - internal
  /api/internal/users/{subject_id}:
    get:
      description: Returns the user record matching the given subject_id. 404 when
        not found. Internal-only — requires the shared secret.
      parameters:
      - description: User subject_id (stable application-level identifier)
        in: path
        name: subject_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.User'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Get a user by subject_id
      tags:
      - users
  /api/internal/users/{subject_id}/auth-identities:
    get:
      description: Returns every external login identity bound to the user, ordered
        so the primary identity surfaces first. Empty list when the user has none.
      parameters:
      - description: User subject_id
        in: path
        name: subject_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              identities:
                items:
                  $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.UserAuthIdentity'
                type: array
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: List a user's auth identities
      tags:
      - auth-identities
  /api/internal/users/{subject_id}/bind-identity:
    post:
      consumes:
      - application/json
      description: Idempotent bind. Recovers soft-deleted identities instead of duplicating.
        Re-binding an explicitly-unbound identity requires options.force_rebind.
      parameters:
      - description: Target user subject_id
        in: path
        name: subject_id
        required: true
        type: string
      - description: Claims to bind + optional BindIdentityOptions
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.bindIdentityRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Bind an identity to a user
      tags:
      - users
  /api/internal/users/{subject_id}/identities/{provider}:
    delete:
      description: Soft-deletes every identity matching the provider on the user and
        marks them explicitly_unbound. Refuses to unbind the user's last identity.
        Promotes the next best-rank identity to primary if the unbind removed the
        primary.
      parameters:
      - description: User subject_id
        in: path
        name: subject_id
        required: true
        type: string
      - description: Provider to unbind (e.g. github, phone, idtrust)
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Unbind all identities for a provider
      tags:
      - users
  /api/internal/users/apply-enterprise-mapping:
    post:
      consumes:
      - application/json
      description: 'Loads tenant_configs.employment_providers for the tenant and upserts
        the user''s employment_identities row when the login provider is enabled.
        Returns 200 with `{"applied": false}` when the provider is not enabled (treated
        as a no-op success — login must not break on tenant config); returns 200 with
        `{"applied": true}` when a row was written or refreshed. Malformed tenant
        YAML surfaces as 500 (operator-visible); missing tenant_configs row is the
        same as disabled (200, applied=false).'
      parameters:
      - description: User + provider + optional tenant_id
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.applyEnterpriseMappingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              applied:
                type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Refresh employment_identities snapshot (login hook)
      tags:
      - users
  /api/internal/users/by-ids:
    post:
      consumes:
      - application/json
      description: Returns a subject_id → user map. Missing IDs are silently omitted;
        callers compare lengths to detect partial misses. Capped at 500 IDs per request.
      parameters:
      - description: Subject IDs to resolve
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.byIDsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              users:
                additionalProperties:
                  $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.User'
                type: object
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Batch-resolve users by subject_id
      tags:
      - users
  /api/internal/users/get-or-create:
    post:
      consumes:
      - application/json
      description: Idempotent upsert driven by the OAuth callback's parsed JWT claims.
        Multi-lookup strategy (external_key → universal_id → casdoor_id → sub → username).
        Creates a primary identity row when a new user is created.
      parameters:
      - description: JWT claim payload (parsed — cs-user does not verify JWT signatures;
          the X-Internal-Token middleware authenticates the caller)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.JWTClaims'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.User'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Upsert user from JWT claims (login entry point)
      tags:
      - users
  /api/internal/users/reissue-token:
    post:
      consumes:
      - application/json
      description: 'Strategy (b) re-sign: server validates the Casdoor JWT, then calls
        this endpoint with the parsed claims + user_subject_id. cs-user loads the
        user''s employment_identities snapshot (Phase A4), builds enterprise claims
        (Phase A5), signs via the configured RSA key (Phase A3), and returns the new
        token. cs-user does NOT re-validate the Casdoor JWT — the X-Internal-Token
        middleware authenticates the caller as the server, and the server has already
        validated the original. Returns 503 when no signing key is configured.'
      parameters:
      - description: Parsed Casdoor claims + user_subject_id + optional tenant_id
          / audience override
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.reissueTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.reissueTokenResponse'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Reissue a cs-user-signed JWT (OAuth callback takeover)
      tags:
      - auth
  /api/internal/users/search:
    get:
      description: Returns active users whose username / display_name / email match
        the keyword (LIKE %keyword%). Limit defaults to 50, capped at 200.
      parameters:
      - description: Search keyword (matched against username / display_name / email)
        in: query
        name: keyword
        type: string
      - description: Max results (default 50, max 200)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              users:
                items:
                  $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.User'
                type: array
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Search active users
      tags:
      - users
  /api/internal/users/transfer-identity:
    post:
      consumes:
      - application/json
      description: Account-merge primitive. Moves the identity identified by external_key
        to the target user. No-op if the target already owns it.
      parameters:
      - description: Transfer target + identity key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.transferIdentityRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Transfer an identity to another user
      tags:
      - users
  /healthz:
    get:
      description: Always returns 200 once the process is up. Unauthenticated — safe
        for K8s livenessProbe.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              status:
                type: string
            type: object
      summary: Liveness probe
      tags:
      - health
  /readyz:
    get:
      description: Returns 200 when the readiness checker (Postgres ping in P0-2)
        passes; 503 otherwise. Unauthenticated — safe for K8s readinessProbe. The
        handler is built by a factory bound to the supplied checker; swag uses the
        @Router path to register this endpoint.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              status:
                type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            properties:
              error:
                type: string
              status:
                type: string
            type: object
      summary: Readiness probe
      tags:
      - health
securityDefinitions:
  InternalToken:
    description: Shared secret for service-to-service calls from costrict-web (ADR
      D8).
    in: header
    name: X-Internal-Token
    type: apiKey
swagger: "2.0"
