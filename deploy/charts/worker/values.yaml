# Default values for costrict-web-worker

replicaCount: 1

image:
  repository: ghcr.io/xdfield/costrict-web-worker
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""


podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Worker specific configuration
config:
  logLevel: "info"
  concurrency: "5"

# Database configuration
database:
  host: postgres
  port: 5432
  name: costrict
  user: postgres
  existingSecret: ""
  existingSecretKey: password

# Redis configuration
redis:
  host: redis
  port: 6379
  existingSecret: ""
  existingSecretKey: password

# Non-text artifact storage used by sync workers.
artifactStorage:
  backend: local
  local:
    # Workers that process binary assets must share the API chart's RWX claim.
    # The default matches an API Helm release named "api". Override this when
    # the API release name or its persistence.existingClaim is different.
    existingClaim: api-artifacts
    mountPath: /app/data/artifacts
  s3:
    endpoint: ""
    bucket: ""
    region: ""
    forcePathStyle: true
    existingSecret: ""
    accessKeySecretKey: access-key
    secretKeySecretKey: secret-key
    sessionTokenSecretKey: ""
    ca:
      existingSecret: ""
      key: ca.crt
      mountPath: /etc/costrict/object-storage

env: []
envFrom: []

livenessProbe:
  enabled: false

readinessProbe:
  enabled: false
