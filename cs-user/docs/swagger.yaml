      - description: JWT claim payload (parsed — cs-user does not verify JWT signatures;
          the X-Internal-Token middleware authenticates the caller)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.JWTClaims'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.User'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Upsert user from JWT claims (login entry point)
      tags:
      - users
  /api/internal/users/list:
    get:
      description: Paginated list of all users in the current tenant scope, optionally
        filtered by keyword / organization / status. Unlike /search, this surface
        includes disabled + banned accounts so admins can see the full roster. Used
        by @server's GET /api/admin/users (admin-user-migration slice).
      parameters:
      - description: Matched against username / display_name / email (LIKE %keyword%)
        in: query
        name: keyword
        type: string
      - description: Exact organization match
        in: query
        name: organization
        type: string
      - description: 'Account status: active | disabled | banned'
        enum:
        - active
        - disabled
        - banned
        in: query
        name: status
        type: string
      - description: 1-based page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 200)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.adminUserListResponse'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: List users for admin console
      tags:
      - users
      - admin
  /api/internal/users/organizations:
    get:
      description: Returns the per-tenant organization roll-up (grouped by users.organization,
        busiest first). Powers the admin console's organization filter dropdown. NULL/empty
        organizations are skipped. Used by @server's GET /api/admin/users/organizations
        (admin-user-migration slice).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              organizations:
                items:
                  $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_user.OrganizationCount'
                type: array
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: List organizations with member counts (admin)
      tags:
      - users
      - admin
  /api/internal/users/reissue-token:
    post:
      consumes:
      - application/json
      description: 'Strategy (b) re-sign: server validates the Casdoor JWT, then calls
        this endpoint with the parsed claims + user_subject_id. cs-user loads the
        user''s employment_identities snapshot (Phase A4), builds enterprise claims
        (Phase A5), signs via the configured RSA key (Phase A3), and returns the new
        token. cs-user does NOT re-validate the Casdoor JWT — the X-Internal-Token
        middleware authenticates the caller as the server, and the server has already
        validated the original. Returns 503 when no signing key is configured.'
      parameters:
      - description: Parsed Casdoor claims + user_subject_id + optional tenant_id
          / audience override
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.reissueTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.reissueTokenResponse'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Reissue a cs-user-signed JWT (OAuth callback takeover)
      tags:
      - auth
  /api/internal/users/search:
    get:
      description: Returns active users whose username / display_name / email match
        the keyword (LIKE %keyword%). Limit defaults to 50, capped at 200. Pass `employee_number`
        to short-circuit the keyword path and look up users via employment_identities
        (used by team-namespace workflow UserRef resolution per doc v1.1 §5.2). `keyword`
        and `employee_number` are mutually exclusive — supplying both yields 400.
      parameters:
      - description: Search keyword (matched against username / display_name / email)
        in: query
        name: keyword
        type: string
      - description: Employee number (工号) — short-circuits keyword path; goes through
          employment_identities JOIN users
        in: query
        name: employee_number
        type: string
      - description: Max results (default 50 for keyword / 1 for employee_number,
          max 200)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              users:
                items:
                  $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.User'
                type: array
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Search active users
      tags:
      - users
  /api/internal/users/transfer-identity:
    post:
      consumes:
      - application/json
      description: Account-merge primitive. Moves the identity identified by external_key
        to the target user. No-op if the target already owns it.
      parameters:
      - description: Transfer target + identity key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.transferIdentityRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Transfer an identity to another user
      tags:
      - users
  /healthz:
    get:
      description: Always returns 200 once the process is up. Unauthenticated — safe
        for K8s livenessProbe.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              status:
                type: string
            type: object
      summary: Liveness probe
      tags:
      - health
  /readyz:
    get:
      description: Returns 200 when the readiness checker (Postgres ping in P0-2)
        passes; 503 otherwise. Unauthenticated — safe for K8s readinessProbe. The
        handler is built by a factory bound to the supplied checker; swag uses the
        @Router path to register this endpoint.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              status:
                type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            properties:
              error:
                type: string
              status:
                type: string
            type: object
      summary: Readiness probe
      tags:
      - health
securityDefinitions:
  InternalToken:
    description: Shared secret for service-to-service calls from costrict-web (ADR
      D8).
    in: header
    name: X-Internal-Token
    type: apiKey
swagger: "2.0"
