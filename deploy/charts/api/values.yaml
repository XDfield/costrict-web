# Default values for costrict-web-api

replicaCount: 1

image:
  repository: zgsm/costrict-web-api
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 0

securityContext:
  runAsNonRoot: false
  runAsUser: 0
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# API specific configuration
config:
  port: "8080"
  logLevel: "info"

# Database migration job
migrate:
  enabled: false

# Database configuration
database:
  host: postgres
  port: 5432
  name: costrict
  user: postgres
  existingSecret: ""
  existingSecretKey: password

# Redis configuration
redis:
  host: redis
  port: 6379
  existingSecret: ""
  existingSecretKey: password

# Artifact storage persistence
persistence:
  enabled: true
  storageClass: "nfs-storage"
  accessModes:
    - ReadWriteMany
  size: 10Gi
  existingClaim: ""
  mountPath: /app/data/artifacts

env: []
envFrom: []

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
