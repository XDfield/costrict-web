{{- if .Values.nginxRouter.enabled }}
{{- $headlessName := .Values.nginxRouter.discovery.headlessServiceName | default (printf "%s-headless" .Release.Name) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx-router-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-nginx-router
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.Version }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  nginx.conf: |
    worker_processes auto;
    # Stock openresty image runs as root by default; this chart runs the
    # container as UID 1000 (nginx-deployment.yaml securityContext), so all
    # writable paths must live under /tmp (an emptyDir mounted writable).
    # Logs go to stderr/stdout so `kubectl logs` can capture them.
    error_log /dev/stderr notice;
    pid /tmp/nginx.pid;

    # Make the internal secret visible to Lua for server-registry mode.
    # NOTE: the env directive is only valid in the main context (top level).
    env INTERNAL_SECRET;

    events {
        worker_connections 1024;
    }

    http {
        include /usr/local/openresty/nginx/conf/mime.types;
        default_type application/octet-stream;

        access_log /dev/stdout;

        # Redirect every runtime-temp path off the read-only prefix into /tmp.
        client_body_temp_path /tmp/client_temp;
        proxy_temp_path       /tmp/proxy_temp;
        fastcgi_temp_path     /tmp/fastcgi_temp;
        uwsgi_temp_path       /tmp/uwsgi_temp;
        scgi_temp_path        /tmp/scgi_temp;

        # Shared across workers: JSON-encoded discovered pod list and DNS metadata
        lua_shared_dict router_state 1m;

        lua_package_path "/usr/local/openresty/site/lualib/?.lua;;";

        init_worker_by_lua_block {
            -- Only worker 0 performs discovery; the result is shared with all
            -- workers via the router_state dict. This avoids N concurrent DNS
            -- queries (one per worker) on every refresh.
            if ngx.worker.id() ~= 0 then
                return
            end

            local router = require "router"
            local dns_utils = require "dns_utils"
            local state = ngx.shared.router_state

            local discovery_mode = "{{ .Values.nginxRouter.discovery.mode }}"
            local gateway_port = {{ .Values.nginxRouter.discovery.gatewayPort }}
            local refresh_ms = {{ .Values.nginxRouter.discovery.refreshIntervalMs }}
            -- Refresh at least once per second; never 0 (which would busy-loop).
            local refresh_interval = math.max(refresh_ms / 1000, 1)
            -- Expire the cached pod list if discovery stops succeeding, so we
            -- stop routing to a stale set rather than holding it forever.
            local ttl_seconds = math.max(refresh_interval * 3, 30)

            {{- if eq .Values.nginxRouter.discovery.mode "dns" }}
            -- Helm renders the FQDN base without cluster domain; the domain is
            -- detected at runtime from /etc/resolv.conf (or overridden in values).
            local headless_base = "{{ $headlessName }}.{{ .Release.Namespace }}.svc"
            local resolver_override = "{{ .Values.nginxRouter.resolver }}"
            local domain_override   = "{{ .Values.nginxRouter.discovery.clusterDomain }}"

            -- Detect nameservers + cluster domain once per worker startup.
            local nameservers, cluster_domain, dns_source = dns_utils.detect_dns(resolver_override, domain_override)
            local headless_fqdn = headless_base .. "." .. cluster_domain

            ngx.log(ngx.INFO,
                "nginx-router dns config: source=", dns_source,
                " nameservers=[", table.concat(nameservers, ","), "]",
                " domain=", cluster_domain,
                " fqdn=", headless_fqdn)

            local function discover_and_update(premature)
                if premature then return end
                local ips, err = router.resolve_ips(headless_fqdn, gateway_port, nameservers)
                if not ips then
                    ngx.log(ngx.ERR, "discovery failed: ", err)
                    return
                end
                if #ips == 0 then
                    -- Do not overwrite the last-known-good list with an empty
                    -- one; let the TTL expire it if this persists.
                    ngx.log(ngx.WARN, "no gateway pods discovered from ", headless_fqdn)
                    return
                end

                local ok, encoded = pcall(router.cjson.encode, ips)
                if not ok then
                    ngx.log(ngx.ERR, "failed to encode ips: ", encoded)
                    return
                end

                state:set("ips", encoded, ttl_seconds)

                -- Also store DNS metadata for /router_status.
                local meta_ok, meta = pcall(router.cjson.encode, {
                    source = dns_source,
                    nameservers = nameservers,
                    cluster_domain = cluster_domain,
                })
                if meta_ok then
                    state:set("dns_meta", meta, ttl_seconds)
                end
            end
            {{- else if eq .Values.nginxRouter.discovery.mode "static" }}
            local resolver_override = "{{ .Values.nginxRouter.resolver }}"
            local domain_override   = "{{ .Values.nginxRouter.discovery.clusterDomain }}"
            -- For static FQDN mode we still need a nameserver to resolve each Pod FQDN.
            -- Auto-detect from /etc/resolv.conf unless explicitly overridden.
            local nameservers, cluster_domain, dns_source = dns_utils.detect_dns(resolver_override, domain_override)

            ngx.log(ngx.INFO,
                "nginx-router static fqdn config: source=", dns_source,
                " nameservers=[", table.concat(nameservers, ","), "]")

            local static_fqdns = {
                {{- range .Values.nginxRouter.discovery.staticFQDNs }}
                "{{ . }}",
                {{- end }}
            }

            local function discover_and_update(premature)
                if premature then return end
                local ips, err = router.resolve_static_fqdns(static_fqdns, gateway_port, nameservers)
                if not ips then
                    ngx.log(ngx.ERR, "static fqdn discovery failed: ", err)
                    return
                end
                if #ips == 0 then
                    ngx.log(ngx.WARN, "no gateway pods resolved from static fqdn list")
                    return
                end

                local ok, encoded = pcall(router.cjson.encode, ips)
                if not ok then
                    ngx.log(ngx.ERR, "failed to encode ips: ", encoded)
                    return
                end

                state:set("ips", encoded, ttl_seconds)

                local meta_ok, meta = pcall(router.cjson.encode, {
                    source = dns_source,
                    nameservers = nameservers,
                    cluster_domain = cluster_domain or "",
                })
                if meta_ok then
                    state:set("dns_meta", meta, ttl_seconds)
                end
            end
            {{- else if eq .Values.nginxRouter.discovery.mode "server-registry" }}
            local registry_url = "{{ .Values.nginxRouter.discovery.serverUrl }}"
            local internal_secret = os.getenv("INTERNAL_SECRET") or ""

            -- serverUrl may be a hostname; cosocket TCP connect needs an IP,
            -- so resolve it using the same auto-detected nameservers as dns mode.
            local resolver_override = "{{ .Values.nginxRouter.resolver }}"
            local nameservers, _, dns_source = dns_utils.detect_dns(resolver_override, "")
            ngx.log(ngx.INFO,
                "nginx-router server-registry dns config: source=", dns_source,
                " nameservers=[", table.concat(nameservers, ","), "]")

            local function discover_and_update(premature)
                if premature then return end
                local ips, err = router.resolve_from_registry(registry_url, internal_secret, refresh_ms, nameservers)
                if not ips then
                    ngx.log(ngx.ERR, "server-registry discovery failed: ", err)
                    return
                end
                if #ips == 0 then
                    ngx.log(ngx.WARN, "no gateway pods returned from server registry")
                    return
                end

                local ok, encoded = pcall(router.cjson.encode, ips)
                if not ok then
                    ngx.log(ngx.ERR, "failed to encode ips: ", encoded)
                    return
                end

                state:set("ips", encoded, ttl_seconds)
            end
            {{- else }}
            {{- fail (printf "Unsupported nginxRouter.discovery.mode: %s" .Values.nginxRouter.discovery.mode) }}
            {{- end }}

            -- Defer first discovery into a timer context; UDP sockets (used by
            -- resty.dns.resolver) are not available in init_worker_by_lua*.
            local ok, err = ngx.timer.at(0, discover_and_update)
            if not ok then
                ngx.log(ngx.ERR, "failed to create initial discovery timer: ", err)
            end
            ok, err = ngx.timer.every(refresh_interval, discover_and_update)
            if not ok then
                ngx.log(ngx.ERR, "failed to create discovery timer: ", err)
            end
        }

        upstream gateway_backend {
            server 0.0.0.1;  # placeholder, overwritten by balancer
            balancer_by_lua_block {
                local router = require "router"
                local state = ngx.shared.router_state
                local balancer = require "ngx.balancer"

                local device_id = ngx.var.device_id
                if not device_id or device_id == "" then
                    ngx.log(ngx.ERR, "device_id missing in balancer")
                    return ngx.exit(502)
                end

                local encoded = state:get("ips")
                if not encoded then
                    ngx.log(ngx.ERR, "gateway pod list not ready")
                    return ngx.exit(502)
                end

                local ips, err = router.cjson.decode(encoded)
                if not ips then
                    ngx.log(ngx.ERR, "failed to decode ips: ", err)
                    return ngx.exit(502)
                end

                local peer, err = router.chash_pick(ips, device_id)
                if not peer then
                    ngx.log(ngx.ERR, "chash pick failed: ", err)
                    return ngx.exit(502)
                end

                -- peer is "ip:port"; assumes IPv4 (the only address family used
                -- by the Gateway headless Service in this deployment).
                local host, port = peer:match("^(.+):(%d+)$")
                local ok, err = balancer.set_current_peer(host, tonumber(port))
                if not ok then
                    ngx.log(ngx.ERR, "set_current_peer failed: ", err)
                    return ngx.exit(502)
                end
            }
        }

        server {
            listen 8080;

            location ~ ^/device/(?P<device_id>[^/]+)/ {
                # The named capture must be explicitly assigned to a variable so
                # it is visible inside balancer_by_lua_block.
                set $device_id $device_id;

                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_read_timeout 86400s;
                proxy_send_timeout 86400s;
                proxy_pass http://gateway_backend;
            }

            location /router_status {
                default_type application/json;
                content_by_lua_block {
                    local router = require "router"
                    local state = ngx.shared.router_state
                    local encoded = state:get("ips") or "[]"
                    local ips, _ = router.cjson.decode(encoded)
                    if not ips then ips = {} end

                    local dns_meta = state:get("dns_meta") or "{}"
                    local dns, _ = router.cjson.decode(dns_meta)
                    if not dns then dns = {} end

                    ngx.say(router.cjson.encode({
                        source = "nginx-router",
                        mode = "{{ .Values.nginxRouter.discovery.mode }}",
                        discovered_ips = ips,
                        dns_source = dns.source or "unknown",
                        nameservers = dns.nameservers or {},
                        cluster_domain = dns.cluster_domain or "unknown",
                    }))
                }
            }

            location /health {
                access_log off;
                add_header Content-Type text/plain;
                return 200 "ok\n";
            }
        }
    }
  dns_utils.lua: |
{{ .Files.Get "tests/dns_utils.lua" | indent 4 }}
  router.lua: |
    -- Pure-Lua DNS discovery + ketama consistent-hash helper for nginx-router.
    -- Runs inside OpenResty; uses only built-in modules.

    local dns_utils = require "dns_utils"
    local resolver = require "resty.dns.resolver"
    local cjson = require "cjson.safe"
    local ngx_crc32_long = ngx.crc32_long
    local table_sort = table.sort
    local table_concat = table.concat
    local table_insert = table.insert
    local ipairs = ipairs
    local pairs = pairs
    local floor = math.floor
    local tonumber = tonumber
    local tostring = tostring
    local type = type

    local _M = {
        cjson = cjson,
    }

    -- Worker-local cache of the most recently built ring, so we rebuild only
    -- when the discovered pod set actually changes (not on every request).
    local _ring_cache = nil
    local _ring_cache_key = nil

    -- Resolve all A records for a single FQDN and return sorted "ip:port" list.
    local function resolve_fqdn(fqdn, port, nameservers)
        local r, err = resolver:new{
            nameservers = nameservers,
            retrans = 3,
            timeout = 2000,
        }
        if not r then
            return nil, "resolver init failed: " .. (err or "unknown")
        end

        local answers, err = r:query(fqdn, { qtype = r.TYPE_A })
        if not answers then
            return nil, "dns query failed: " .. (err or "unknown")
        end
        if answers.errcode then
            return nil, "dns query error code: " .. tostring(answers.errcode)
        end

        local ips = {}
        for _, ans in ipairs(answers) do
            -- Only A records carry a usable IP; skip CNAME/other record types.
            if ans.address and ans.type == r.TYPE_A then
                ips[#ips + 1] = ans.address .. ":" .. tostring(port)
            end
        end
        table_sort(ips)
        return ips
    end

    -- Resolve all A records for a headless Service and return sorted "ip:port" list.
    function _M.resolve_ips(fqdn, port, nameservers)
        return resolve_fqdn(fqdn, port, nameservers)
    end

    -- Resolve a fixed list of StatefulSet Pod FQDNs, merge and deduplicate the
    -- resulting IPs, and return a sorted "ip:port" list.
    function _M.resolve_static_fqdns(fqdns, port, nameservers)
        local seen = {}
        local ips = {}
        for _, fqdn in ipairs(fqdns) do
            local resolved, err = resolve_fqdn(fqdn, port, nameservers)
            if not resolved then
                ngx.log(ngx.WARN, "failed to resolve ", fqdn, ": ", err)
            else
                for _, ip in ipairs(resolved) do
                    if not seen[ip] then
                        seen[ip] = true
                        ips[#ips + 1] = ip
                    end
                end
            end
        end
        table_sort(ips)
        return ips
    end

    -- Minimal HTTP/1.1 GET client using ngx.socket.tcp. Does not depend on
    -- lua-resty-http, so it works in the stock openresty image.
    local function read_chunked_body(sock)
        local parts = {}
        while true do
            local line, err = sock:receive("*l")
            if not line then return nil, err end
            local size = tonumber(line, 16)
            if not size then return nil, "invalid chunk size" end
            if size == 0 then
                sock:receive("*l") -- trailing CRLF
                break
            end
            local chunk, err = sock:receive(size)
            if not chunk then return nil, err end
            table_insert(parts, chunk)
            sock:receive(2) -- chunk trailing CRLF
        end
        return table_concat(parts)
    end

    -- Resolve a hostname to an IPv4 address if it is not already an IP.
    -- Falls back to the original host on resolution failure so callers can
    -- still attempt a direct connect (e.g. for IPs or unix-domain paths).
    local function resolve_host(host, nameservers)
        -- Very small IPv4 literal check; IPv6 not supported by this client.
        if host:match("^%d+%.%d+%.%d+%.%d+$") then
            return host
        end
        local r, err = resolver:new{
            nameservers = nameservers,
            retrans = 3,
            timeout = 2000,
        }
        if not r then
            return nil, "resolver init failed: " .. (err or "unknown")
        end
        local answers, err = r:query(host, { qtype = r.TYPE_A })
        if not answers then
            return nil, "dns query failed: " .. (err or "unknown")
        end
        if answers.errcode then
            return nil, "dns query error code: " .. tostring(answers.errcode)
        end
        for _, ans in ipairs(answers) do
            if ans.address and ans.type == r.TYPE_A then
                return ans.address
            end
        end
        return nil, "no A record found"
    end

    function _M.http_get(url, headers, timeout_ms)
        -- Parse http://host:port/path ; IPv6 not supported by this minimal client.
        local host, port_str, path = url:match("^http://([^:/]+):?(%d*)/?(.*)$")
        if not host then
            return nil, "invalid registry url"
        end
        local port = tonumber(port_str) or 80
        local request_path = "/" .. path
        if path ~= "" and path:sub(-1) ~= "/" then
            request_path = request_path .. "/"
        end
        request_path = request_path .. "internal/gateway/list"

        local sock = ngx.socket.tcp()
        sock:settimeout(timeout_ms or 2000)
        local ok, err = sock:connect(host, port)
        if not ok then
            return nil, "connect failed: " .. (err or "unknown")
        end

        -- Honor a caller-supplied Host header (used when we connect by IP
        -- but still want the original hostname sent to the server).
        local host_header = host
        if headers then
            for k, v in pairs(headers) do
                if k:lower() == "host" then
                    host_header = v
                    break
                end
            end
        end

        local lines = {
            "GET " .. request_path .. " HTTP/1.1",
            "Host: " .. host_header,
            "Connection: close",
        }
        for k, v in pairs(headers or {}) do
            if k:lower() ~= "host" then
                table_insert(lines, k .. ": " .. v)
            end
        end
        table_insert(lines, "")
        table_insert(lines, "")

        local bytes, err = sock:send(table.concat(lines, "\r\n"))
        if not bytes then
            return nil, "send failed: " .. (err or "unknown")
        end

        local status_line, err = sock:receive("*l")
        if not status_line then
            return nil, "failed to read status: " .. (err or "unknown")
        end
        local status = tonumber(status_line:match("HTTP/%d%.%d%s+(%d+)"))
        if not status then
            return nil, "invalid status line"
        end

        local content_length = nil
        local chunked = false
        while true do
            local line, err = sock:receive("*l")
            if not line then
                return nil, "failed to read header: " .. (err or "unknown")
            end
            if line == "" then break end
            local k, v = line:match("^([^:]+):%s*(.*)$")
            if k then
                local kl = k:lower()
                if kl == "content-length" then
                    content_length = tonumber(v)
                elseif kl == "transfer-encoding" and v:lower() == "chunked" then
                    chunked = true
                end
            end
        end

        local body
        if chunked then
            body, err = read_chunked_body(sock)
            if not body then return nil, err end
        elseif content_length then
            body, err = sock:receive(content_length)
            if not body then return nil, "failed to read body: " .. (err or "unknown") end
        else
            body, err = sock:receive("*a")
            if not body then return nil, "failed to read body: " .. (err or "unknown") end
        end

        sock:close()
        return body, status
    end

    -- Pull the live gateway list from the Server registry and return a sorted
    -- "ip:port" list parsed from each gateway's internalURL.
    -- nameservers is required when server_url uses a hostname instead of an IP.
    function _M.resolve_from_registry(server_url, secret, timeout_ms, nameservers)
        local headers = {}
        if secret and secret ~= "" then
            headers["X-Internal-Secret"] = secret
        end

        -- server_url may be a hostname, but raw cosocket TCP connect needs an IP.
        local original_host, port_str, path = server_url:match("^http://([^:/]+):?(%d*)/?(.*)$")
        if not original_host then
            return nil, "invalid registry url"
        end
        nameservers = nameservers or {}
        local ip, err = resolve_host(original_host, nameservers)
        if not ip then
            return nil, "resolve failed: " .. (err or "unknown")
        end
        local resolved_url = "http://" .. ip .. ":" .. (port_str ~= "" and port_str or "80") .. "/" .. path
        headers["Host"] = original_host

        local body, status = _M.http_get(resolved_url, headers, timeout_ms)
        if not body then
            return nil, status
        end
        if status ~= 200 then
            return nil, "registry returned status " .. tostring(status)
        end

        local data, err = cjson.decode(body)
        if not data then
            return nil, "failed to decode registry response: " .. (err or "unknown")
        end

        local seen = {}
        local ips = {}
        if type(data.gateways) == "table" then
            for _, gw in ipairs(data.gateways) do
                local internal_url = gw.internalURL
                if internal_url then
                    -- internalURL is like http://10.244.1.10:8081
                    local host_port = internal_url:match("^https?://(.+)$")
                    if host_port and not seen[host_port] then
                        seen[host_port] = true
                        ips[#ips + 1] = host_port
                    end
                end
            end
        end
        table_sort(ips)
        return ips
    end

    -- Build ketama ring points deterministically from sorted node list.
    -- Returns a flat array of {hash=uint32, id=string}, sorted by hash with a
    -- stable tie-break on id so all workers/replicas agree on ordering even
    -- when two points hash to the same value.
    local function build_ring(ips, replicas)
        replicas = replicas or 160
        local points = {}
        for _, ip in ipairs(ips) do
            for i = 1, replicas do
                local key = ip .. "-" .. i
                points[#points + 1] = {
                    hash = ngx_crc32_long(key),
                    id = ip,
                }
            end
        end
        table_sort(points, function(a, b)
            if a.hash ~= b.hash then
                return a.hash < b.hash
            end
            return a.id < b.id
        end)
        return points
    end

    -- Pick a backend for the given key using ketama consistent hashing.
    function _M.chash_pick(ips, key)
        if not ips or #ips == 0 then
            return nil, "empty node list"
        end

        local cache_key = table_concat(ips, "\0")
        if _ring_cache_key ~= cache_key then
            _ring_cache = build_ring(ips)
            _ring_cache_key = cache_key
        end
        local ring = _ring_cache

        local hash = ngx_crc32_long(key)

        -- binary search for first point >= hash
        local lo, hi = 1, #ring
        while lo < hi do
            local mid = floor((lo + hi) / 2)
            if ring[mid].hash < hash then
                lo = mid + 1
            else
                hi = mid
            end
        end

        if lo == #ring and ring[lo].hash < hash then
            lo = 1
        end

        return ring[lo].id
    end

    return _M
{{- end }}
