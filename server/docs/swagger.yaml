host: localhost:8080
info:
  contact:
    name: CoStrict Team
    url: https://costrict.ai
  description: AI Agent Platform API - Skill marketplace, organization and repository
    management.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Costrict Web API
  version: "1.0"
paths:
  /admin/experiences/{id}:
    get:
      description: Get details of a specific experience candidate
      parameters:
      - description: Candidate ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ExperienceCandidate'
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Get experience candidate by ID
      tags:
      - admin/experiences
  /admin/experiences/{id}/approve:
    post:
      description: Approve and promote an experience candidate to item metadata
      parameters:
      - description: Candidate ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ExperiencePromotion'
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Approve an experience candidate
      tags:
      - admin/experiences
  /admin/experiences/{id}/reject:
    post:
      consumes:
      - application/json
      description: Reject an experience candidate
      parameters:
      - description: Candidate ID
        in: path
        name: id
        required: true
        type: string
      - description: Rejection reason
        in: body
        name: body
        schema:
          properties:
            reason:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Reject an experience candidate
      tags:
      - admin/experiences
  /admin/experiences/pending:
    get:
      description: Get pending experience candidates awaiting review
      parameters:
      - description: 'Page size (default: 20)'
        in: query
        name: limit
        type: integer
      - description: 'Page offset (default: 0)'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              candidates:
                items:
                  $ref: '#/definitions/models.ExperienceCandidate'
                type: array
              total:
                type: integer
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Get pending experience candidates
      tags:
      - admin/experiences
  /admin/experiences/run-analysis:
    post:
      description: Trigger automatic pattern analysis for all items with recent activity
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Run automatic analysis
      tags:
      - admin/experiences
  /artifacts/{id}:
    delete:
      description: Delete an artifact by ID and remove its stored file
      parameters:
      - description: Artifact ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Delete artifact
      tags:
      - artifacts
  /artifacts/{id}/download:
    get:
      description: Download a file artifact by ID
      parameters:
      - description: Artifact ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Download artifact
      tags:
      - artifacts
  /artifacts/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload a file artifact for a skill item
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      - description: Item ID
        in: formData
        name: item_id
        required: true
        type: string
      - description: Artifact version
        in: formData
        name: version
        type: string
      - description: Uploader user ID
        in: formData
        name: uploaded_by
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.CapabilityArtifact'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Upload artifact
      tags:
      - artifacts
  /auth/login:
    get:
      consumes:
      - application/json
      description: Exchange OAuth authorization code for access token
      parameters:
      - description: OAuth code
        in: body
        name: body
        required: true
        schema:
          properties:
            code:
              type: string
            state:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              token:
                type: string
              tokenType:
                type: string
              user:
                type: object
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: OAuth login
      tags:
      - auth
  /auth/logout:
    post:
      description: Invalidate current session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      description: Get information of the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /items:
    get:
      description: Get all skill items visible to the current user with pagination
      parameters:
      - description: Filter by item type
        in: query
        name: type
        type: string
      - description: 'Filter by status (default: active)'
        in: query
        name: status
        type: string
      - description: Search by name or description
        in: query
        name: search
        type: string
      - description: Filter by category
        in: query
        name: category
        type: string
      - description: Filter by registry ID
        in: query
        name: registryId
        type: string
      - description: 'Page size (default: 24, max: 100)'
        in: query
        name: limit
        type: integer
      - description: 'Page offset (default: 0)'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              hasMore:
                type: boolean
              items:
                items:
                  $ref: '#/definitions/models.CapabilityItem'
                type: array
              total:
                type: integer
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: List all visible items
      tags:
