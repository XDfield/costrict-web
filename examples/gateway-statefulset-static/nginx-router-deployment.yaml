# nginx-router Deployment.
# 使用 OpenResty 镜像，挂载 nginx.conf 与 router.lua 两个 ConfigMap key。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: <RELEASE_NAME>-nginx-router
  namespace: <NAMESPACE>
  labels:
    app.kubernetes.io/name: gateway-nginx-router
    app.kubernetes.io/instance: <RELEASE_NAME>
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-nginx-router
      app.kubernetes.io/instance: <RELEASE_NAME>
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-nginx-router
        app.kubernetes.io/instance: <RELEASE_NAME>
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: nginx-router
          image: "openresty/openresty:1.25.3.1-0-alpine"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # server-registry 模式下需要；static/dns 模式下可留空。
            - name: INTERNAL_SECRET
              value: "<INTERNAL_SECRET>"
          volumeMounts:
            - name: config
              mountPath: /usr/local/openresty/nginx/conf/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: config
              mountPath: /usr/local/openresty/site/lualib/router.lua
              subPath: router.lua
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: <RELEASE_NAME>-nginx-router-config
        - name: tmp
          emptyDir: {}
