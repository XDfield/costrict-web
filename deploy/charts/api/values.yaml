# Default values for costrict-web-api

replicaCount: 1

image:
  repository: ghcr.io/xdfield/costrict-web-api
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: NodePort
  port: 8080
  nodePort: 32053

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# API specific configuration
config:
  port: "8080"
  logLevel: "info"

# Database migration job
migrate:
  enabled: false

# Database configuration
database:
  host: postgres
  port: 5432
  name: costrict
  user: postgres
  existingSecret: ""
  existingSecretKey: password

# Redis configuration
redis:
  host: redis
  port: 6379
  existingSecret: ""
  existingSecretKey: password

# Artifact storage persistence
persistence:
  enabled: true
  accessModes:
    - ReadWriteMany
  size: 10Gi
  existingClaim: ""
  mountPath: /app/data/artifacts
  # NFS provisioner used by the created StorageClass; update to match your cluster
  provisioner: "nfs-subdir-external-provisioner"
  # Reclaim policy for dynamically provisioned volumes (Retain or Delete)
  reclaimPolicy: Retain

env: []
envFrom: []

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Runtime log directory for applications that write to ./logs
logs:
  enabled: true
  mountPath: /app/logs
