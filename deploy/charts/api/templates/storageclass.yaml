{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) (not .Values.persistence.storageClass) }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.Version }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
provisioner: {{ .Values.persistence.provisioner }}
reclaimPolicy: {{ .Values.persistence.reclaimPolicy | default "Retain" }}
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
{{- end }}
