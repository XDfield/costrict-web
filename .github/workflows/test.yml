# Test gate for all Go modules in the costrict-web monorepo.
#
# Triggered on every pull request and push to main / feat-* branches.
# Runs go build + go vet + go test (race detector + coverage) for every
# go.mod in the repo. Coverage is uploaded to the PR as a check.
#
# This workflow is the canonical test gate — keep it fast and reliable.
# Image builds and chart releases live in build-images.yaml / lint-charts.yaml.

name: test

on:
  pull_request:
    branches: [main, 'feat/**', 'release/**']
  push:
    branches: [main, 'feat/**']

# Cancel superseded runs on the same PR to save CI minutes.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: Find Go modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
      - name: Find all go.mod directories
        id: find
        run: |
          set -euo pipefail
          # Collect every directory containing a go.mod, relative to repo root.
          mapfile -t dirs < <(find . -name go.mod -not -path './vendor/*' -exec dirname {} \; | sort -u)
          echo "Found modules: ${dirs[@]}"
          # Build a JSON array for the matrix.
          json=$(printf '%s\n' "${dirs[@]}" | jq -R . | jq -sc .)
          echo "modules=$json" >> "$GITHUB_OUTPUT"

  test:
    name: ${{ matrix.module }} test
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Download deps
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race + coverage)
        run: |
          # Coverage file is namespaced by module so the upload step can
          # distinguish them.
          module_slug=$(echo "${{ matrix.module }}" | tr '/' '_')
          go test -race -coverprofile="coverage-${module_slug}.out" -covermode=atomic ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.module }}
          path: ${{ matrix.module }}/coverage-*.out
          if-no-files-found: ignore
          retention-days: 7

  # Aggregate status check — required for branch protection. Succeeds only
  # when every per-module test job passed.
  test-passed:
    name: All modules tested
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Verify all matrix jobs passed
        run: |
          echo "Test job conclusion: ${{ needs.test.result }}"
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "::error::One or more Go modules failed tests. See job logs."
            exit 1
          fi
          echo "✓ All modules passed build + vet + test"
