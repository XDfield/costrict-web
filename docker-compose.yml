services:
  # PostgreSQL 数据库 (with pgvector)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: costrict-postgres
    environment:
      POSTGRES_USER: costrict
      POSTGRES_PASSWORD: costrict_password
      POSTGRES_DB: costrict_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costrict"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Casdoor 认证服务
  casdoor:
    image: casbin/casdoor:latest
    container_name: costrict-casdoor
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./casdoor/app.conf:/conf/app.conf

  # Sync Worker（可多副本横向扩展）
  # worker:
  #   build:
  #     context: ./server
  #     dockerfile: Dockerfile.worker
  #   environment:
  #     DATABASE_URL: postgres://costrict:costrict_password@postgres:5432/costrict_db?sslmode=disable
  #     WORKER_CONCURRENCY: "3"
  #     WORKER_POLL_INTERVAL_SECONDS: "5"
  #     SYNC_TMP_DIR: /tmp/costrict-sync
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - sync_tmp:/tmp/costrict-sync

volumes:
  postgres_data:
  sync_tmp:
