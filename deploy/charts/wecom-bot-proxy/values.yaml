# Default values for costrict-web-wecom-bot-proxy
namespace: costrict-web

replicaCount: 1

image:
  repository: ghcr.io/xdfield/costrict-web-wecom-bot-proxy
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 9090

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# -- Bot credentials (stored in Secret)
bot:
  botId: ""
  secret: ""
  wsUrl: "wss://openws.work.weixin.qq.com"
  heartbeatInterval: "30s"
  reconnectInitialBackoff: "5s"
  reconnectMaxBackoff: "60s"

# -- Backend configuration
backend:
  url: "http://costrict-web-api:8080/api/webhooks/channels/wecom-bot"
  authToken: ""
  hmacSecret: ""
  timeout: "10s"
  retry: 3

routing:
  defaultBackend: "backend-a"
  taskRouteTtl: "24h"

dedup:
  enabled: true
  maxEntries: 10000
  ttlSeconds: 300

logging:
  level: "info"
  format: "json"

env: []
envFrom: []

livenessProbe:
  enabled: true
  httpGet:
    path: /api/bot/health
    port: 9090
  initialDelaySeconds: 15
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  enabled: true
  httpGet:
    path: /api/bot/health
    port: 9090
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
