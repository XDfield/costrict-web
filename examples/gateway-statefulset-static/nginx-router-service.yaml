# nginx-router ClusterIP Service.
# APISIX 透传路由指向此 Service。
apiVersion: v1
kind: Service
metadata:
  name: <RELEASE_NAME>-nginx-router
  namespace: <NAMESPACE>
  labels:
    app.kubernetes.io/name: gateway-nginx-router
    app.kubernetes.io/instance: <RELEASE_NAME>
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: gateway-nginx-router
    app.kubernetes.io/instance: <RELEASE_NAME>
