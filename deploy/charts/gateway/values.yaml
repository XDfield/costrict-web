# Default values for costrict-web-gateway

replicaCount: 1

# Run Gateway as a DaemonSet instead of a Deployment.
# When enabled, one Gateway Pod is scheduled per Node and replicaCount is ignored.
# Mutually exclusive with statefulSet.enabled.
daemonSet:
  enabled: false
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

# Run Gateway as a StatefulSet instead of a Deployment/DaemonSet.
# Provides stable Pod names (e.g. costrict-web-gateway-0) so GATEWAY_ID stays
# the same across restarts. Useful when nginx-router uses static FQDN discovery.
# Mutually exclusive with daemonSet.enabled.
statefulSet:
  enabled: false
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate

image:
  repository: ghcr.io/xdfield/costrict-web-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""


podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: NodePort
  port: 8081
  nodePort: 30276

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Gateway specific configuration
config:
  port: "8081"
  serverUrl: "http://costrict-web-api:8080"
  gatewayId: ""
  # Deployment 模式下 Gateway ID 默认使用 Pod 名；设置前缀后变为 "{prefix}{podName}"。
  # DaemonSet 模式下 Gateway ID 默认使用 Node 名；设置前缀后变为 "{prefix}{nodeName}"。
  # StatefulSet 模式下 Gateway ID 默认使用稳定的 Pod 名；设置前缀后变为 "{prefix}{podName}"。
  # 三种模式下留空均保持自动生成行为。
  gatewayIdPrefix: ""
  endpoint: ""
  # 本集群 Server 的公网 API 地址（如 https://api-a.example.com）。
  # 多集群（共享数据库、域名不同）部署时必填：Gateway 注册时上报，
  # Web 前端据此把设备请求路由到设备归属集群。单集群部署留空即可。
  apiBaseURL: ""
  internalUrl: ""
  region: "default"
  capacity: 100

  # Nacos dynamic endpoint configuration.
  # When serverAddr and dataID are set, the gateway reads endpoint from Nacos
  # instead of the static `endpoint` value above. Each cluster can publish a
  # different endpoint value in its own Nacos to steer clients to that cluster.
  nacos:
    enabled: false
    serverAddr: ""          # e.g. nacos-headless.nacos.svc.cluster.local:8848
    namespaceId: ""         # optional namespace ID
    group: "DEFAULT_GROUP"  # config group
    dataID: ""              # config data ID
    apiBaseURLDataID: ""  # optional: data ID holding this cluster's Server public API URL
    timeoutMs: 5000
    username: ""            # optional Nacos auth username
    password: ""            # optional Nacos auth password
    accessToken: ""         # optional Nacos auth access token

env: []
envFrom: []

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8081
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# nginx-router 中间层配置。
# 启用后，由 OpenResty 负责从 /device/{deviceID}/... 提取 deviceID、
# 一致性哈希(chash)路由以及发现 Gateway Pod。
# 支持两种发现模式：
#   dns            - 解析 Gateway headless Service DNS A 记录（默认，兼容旧行为）
#   static         - 解析 StatefulSet Pod FQDN；staticFQDNs 留空时按 replicaCount 自动生成
# APISIX 退化为薄 WebSocket 透传层，不再需要 K8s 服务发现及对应 RBAC。
nginxRouter:
  enabled: false
  replicaCount: 2
  image:
    repository: openresty/openresty
    tag: "1.25.3.1-0-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  # Gateway Pod 发现相关
  discovery:
    # 发现模式：dns | static
    mode: "dns"
    # dns 模式下解析的 headless Service；留空时使用 <release>-headless.<namespace>.svc.cluster.local
    headlessServiceName: ""
    # dns/static 模式下 Gateway 的端口
    gatewayPort: 8081
    # 发现刷新间隔（毫秒）
    refreshIntervalMs: 5000
    # 集群域名后缀（如 cluster.local / k8s.internal）。
    # 留空时由 nginx-router 在启动时从 Pod 的 /etc/resolv.conf 自动探测。
    clusterDomain: ""
    # static 模式下需要解析的 StatefulSet Pod FQDN 列表。
    # 留空时按 statefulSet 的 replicaCount 自动生成
    # <release>-<i>.<release>-headless.<namespace>.svc.<cluster-domain>（i = 0..N-1），
    # cluster-domain 由 nginx-router 运行时自动探测；仅在 Pod 命名不规则时才需显式填写。
    # 示例：
    #   - "costrict-web-gateway-0.costrict-web-gateway-headless.costrict.svc.cluster.local"
    #   - "costrict-web-gateway-1.costrict-web-gateway-headless.costrict.svc.cluster.local"
    staticFQDNs: []
  # DNS 服务器地址；多个地址可用空格/逗号分隔。
  # 留空时由 nginx-router 在启动时从 Pod 的 /etc/resolv.conf 自动探测。
  # 仅在 hostNetwork、自定义 dnsConfig 等非常规场景需要显式指定。
  resolver: ""
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  podAnnotations: {}
