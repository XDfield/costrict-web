{{- if .Values.statefulSet.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.Version }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  serviceName: {{ .Release.Name }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: {{ .Values.statefulSet.podManagementPolicy }}
  {{- with .Values.statefulSet.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/config: {{ toJson .Values.config | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: default
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            - name: GATEWAY_PORT
              value: {{ .Values.config.port | quote }}
            - name: SERVER_URL
              value: {{ .Values.config.serverUrl | quote }}
            # StatefulSet 模式下 Pod 名稳定（如 costrict-web-gateway-0），
            # 重启后 Gateway ID 保持不变，便于注册中心与路由一致。
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: GATEWAY_ID
              value: "{{ .Values.config.gatewayIdPrefix }}$(POD_NAME)"
            - name: GATEWAY_ENDPOINT
              value: {{ .Values.config.endpoint | quote }}
            {{- if .Values.config.nacos.enabled }}
            - name: GATEWAY_NACOS_SERVER_ADDR
              value: {{ .Values.config.nacos.serverAddr | quote }}
            - name: GATEWAY_NACOS_NAMESPACE_ID
              value: {{ .Values.config.nacos.namespaceId | quote }}
            - name: GATEWAY_NACOS_GROUP
              value: {{ .Values.config.nacos.group | quote }}
            - name: GATEWAY_NACOS_DATA_ID
              value: {{ .Values.config.nacos.dataID | quote }}
            - name: GATEWAY_NACOS_TIMEOUT_MS
              value: {{ .Values.config.nacos.timeoutMs | quote }}
            - name: GATEWAY_NACOS_USERNAME
              value: {{ .Values.config.nacos.username | quote }}
            - name: GATEWAY_NACOS_PASSWORD
              value: {{ .Values.config.nacos.password | quote }}
            - name: GATEWAY_NACOS_ACCESS_TOKEN
              value: {{ .Values.config.nacos.accessToken | quote }}
            {{- end }}
            # Server 通过 Pod IP 直接回连该 Gateway，不经过 APISIX/nginx-router。
            - name: GATEWAY_INTERNAL_URL
              value: "http://$(POD_IP):{{ .Values.config.port }}"
            - name: GATEWAY_REGION
              value: {{ .Values.config.region | quote }}
            - name: GATEWAY_CAPACITY
              value: {{ .Values.config.capacity | quote }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
