name: Build and Push Docker Images

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.0.3)"
        required: true
        default: "v0.0.1"
      services:
        description: "Services to build (comma-separated: gateway,api,worker,portal,all)"
        required: false
        default: "all"
      push:
        description: "Push images to registry"
        required: false
        default: "true"
        type: boolean

env:
  REGISTRY: ghcr.io/xdfield
  DOCKER_BUILDKIT: 1

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}
      version: ${{ steps.version.outputs.version }}
      should_push: ${{ steps.set-push.outputs.should_push }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            # Remove 'v' prefix if present
            VERSION="${VERSION#v}"
            [ -z "$VERSION" ] && VERSION="latest"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Set services to build
        id: set-services
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICES_INPUT="${{ github.event.inputs.services }}"
          else
            SERVICES_INPUT="all"
          fi

          if [ "$SERVICES_INPUT" = "all" ]; then
            echo 'services=["gateway","api","worker","portal"]' >> $GITHUB_OUTPUT
          else
            # Convert comma-separated to JSON array (compact single-line output)
            SERVICES_JSON=$(echo "$SERVICES_INPUT" | tr ',' '\n' | xargs | tr ' ' ',' | jq -Rc 'split(",")')
            echo "services=$SERVICES_JSON" >> $GITHUB_OUTPUT
          fi

      - name: Set push flag
        id: set-push
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_push=${{ github.event.inputs.push }}" >> $GITHUB_OUTPUT
          else
            echo "should_push=true" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.services) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update portal submodule to dev branch
        run: |
          cd portal
          git fetch origin '+refs/heads/dev:refs/remotes/origin/dev'
          git checkout -B dev origin/dev
          echo "portal submodule commit: $(git rev-parse HEAD)"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: needs.prepare.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image info
        id: image
        run: |
          SERVICE="${{ matrix.service }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          case $SERVICE in
            gateway)
              CONTEXT="./gateway"
              DOCKERFILE="./gateway/Dockerfile"
              IMAGE_NAME="costrict-web-gateway"
              ;;
            api)
              CONTEXT="./server"
              DOCKERFILE="./server/Dockerfile"
              IMAGE_NAME="costrict-web-api"
              ;;
            worker)
              CONTEXT="./server"
              DOCKERFILE="./server/Dockerfile.worker"
              IMAGE_NAME="costrict-web-worker"
              ;;
            portal)
              CONTEXT="./portal"
              DOCKERFILE="./portal/packages/app-ai-native/Dockerfile"
              IMAGE_NAME="costrict-web-portal"
              ;;
          esac

          echo "context=$CONTEXT" >> $GITHUB_OUTPUT
          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "image_tag=${{ env.REGISTRY }}/${IMAGE_NAME}:${VERSION}" >> $GITHUB_OUTPUT

      - name: Set build args
        id: build_args
        run: |
          if [ "${{ matrix.service }}" = "portal" ]; then
            echo "args=VITE_API_PREFIX=/costrict-web-api" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.image.outputs.context }}
          file: ${{ steps.image.outputs.dockerfile }}
          push: ${{ needs.prepare.outputs.should_push == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}:latest
          build-args: ${{ steps.build_args.outputs.args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: |
          echo "### ${{ matrix.service }} Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}:${{ needs.prepare.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  summary:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## Docker Images Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.prepare.outputs.services }}' | jq -r '.[]' | while read service; do
            case $service in
              gateway) IMAGE="costrict-web-gateway" ;;
              api) IMAGE="costrict-web-api" ;;
              worker) IMAGE="costrict-web-worker" ;;
              portal) IMAGE="costrict-web-portal" ;;
            esac
            echo "- \`${{ env.REGISTRY }}/${IMAGE}:${{ needs.prepare.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Pull images" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/costrict-web-gateway:${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/costrict-web-api:${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/costrict-web-worker:${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/costrict-web-portal:${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          REGISTRY: ${{ env.REGISTRY }}
