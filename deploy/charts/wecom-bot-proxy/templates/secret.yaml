apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wecom-bot-proxy.fullname" . }}
  namespace: {{ include "wecom-bot-proxy.namespace" . }}
  labels:
    {{- include "wecom-bot-proxy.labels" . | nindent 4 }}
type: Opaque
stringData:
  BOT_ID: {{ .Values.bot.botId | quote }}
  BOT_SECRET: {{ .Values.bot.secret | quote }}
  BACKEND_AUTH_TOKEN: {{ .Values.backend.authToken | quote }}
  BACKEND_HMAC_SECRET: {{ .Values.backend.hmacSecret | quote }}
