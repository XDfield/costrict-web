# Example tenant_configs.config_yaml for an idtrust enterprise deployment.
# Includes both employment_providers (field_map + Plan B provider_detection)
# and the corresponding provider_mapping entry.
#
# Upload via:
#   ./configure-employment-mapping.sh --tenant acme-corp --yaml examples/idtrust-employment.yaml
#
# A trimmed dev variant lives at ../../scripts/examples/idtrust-employment-dev.yaml
# and is what scripts/bootstrap-dev-env.sh uploads during dev-env bootstrap.

employment_providers:
  enabled:
    - idtrust

  # Plan B detection: when the upstream Casdoor JWT does not set `provider`
  # explicitly, cs-user falls back to matching ExternalClaims.signupApplication
  # against these rules. The value must equal the Casdoor Application `name`
  # that users land on when they sign in via idtrust.
  #
  # server/internal/authidentity/normalize.go also has a hard-coded fallback
  # for `signupApplication == "idtrust"`, so this default keeps both layers
  # aligned without code edits. Change the value here if your Casdoor
  # Application uses a different name.
  provider_detection:
    - signup_application: "idtrust"
      provider: idtrust

  field_map:
    idtrust:
      # Identity
      enterprise_uid:              "properties.oauth_Custom.id"
      employee_number:             "properties.oauth_Custom.employeeNumber"

      # Organization
      job_title:                   "properties.oauth_Custom.jobTitle"
      job_level:                   "properties.oauth_Custom.jobLevel"
      cost_center:                 "properties.oauth_Custom.costCenter"
      org_path:                    "properties.oauth_Custom.department"
      employment_type:             "properties.oauth_Custom.employmentType"
      work_location:               "properties.oauth_Custom.workPlace"

      # Manager (often unavailable — uncomment when idtrust exposes them)
      # direct_manager_subject_id:   "properties.oauth_Custom.managerId"
      # direct_manager_external_ref: "properties.oauth_Custom.managerEmail"

      # Dates (idtrust usually returns ISO-8601 strings; cs-user parses)
      hire_date:                   "properties.oauth_Custom.hireDate"
      regular_date:                "properties.oauth_Custom.regularDate"

# provider_mapping — multi-identity rank/sync hints. The /api/internal/
# tenant/provider-mapping endpoint reads this section directly.
provider_mapping:
  idtrust:
    enabled: true
    rank: 10
    enterprise_sync:
      interval: 24h
