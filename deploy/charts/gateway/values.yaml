# Default values for costrict-web-gateway

replicaCount: 1

# Run Gateway as a DaemonSet instead of a Deployment.
# When enabled, one Gateway Pod is scheduled per Node and replicaCount is ignored.
daemonSet:
  enabled: false
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

image:
  repository: ghcr.io/xdfield/costrict-web-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""


podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: NodePort
  port: 8081
  nodePort: 30276

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Gateway specific configuration
config:
  port: "8081"
  serverUrl: "http://costrict-web-api:8080"
  gatewayId: ""
  # Deployment 模式下 Gateway ID 默认使用 Pod 名；设置前缀后变为 "{prefix}{podName}"。
  # DaemonSet 模式下 Gateway ID 默认使用 Node 名；设置前缀后变为 "{prefix}{nodeName}"。
  # 两种模式下留空均保持自动生成行为。
  gatewayIdPrefix: ""
  endpoint: ""
  internalUrl: ""
  region: "default"
  capacity: 100

  # Nacos dynamic endpoint configuration.
  # When serverAddr and dataID are set, the gateway reads endpoint from Nacos
  # instead of the static `endpoint` value above. Each cluster can publish a
  # different endpoint value in its own Nacos to steer clients to that cluster.
  nacos:
    enabled: false
    serverAddr: ""          # e.g. nacos-headless.nacos.svc.cluster.local:8848
    namespaceId: ""         # optional namespace ID
    group: "DEFAULT_GROUP"  # config group
    dataID: ""              # config data ID
    timeoutMs: 5000
    username: ""            # optional Nacos auth username
    password: ""            # optional Nacos auth password
    accessToken: ""         # optional Nacos auth access token

env: []
envFrom: []

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8081
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# nginx-router 中间层配置。
# 启用后，由 OpenResty 负责从 /device/{deviceID}/... 提取 deviceID、
# 一致性哈希(chash)路由以及通过 headless Service DNS 发现 Gateway Pod。
# APISIX 退化为薄 WebSocket 透传层，不再需要 K8s 服务发现及对应 RBAC。
nginxRouter:
  enabled: false
  replicaCount: 2
  image:
    repository: openresty/openresty
    tag: "1.25.3.1-0-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  # Gateway Pod 发现相关
  discovery:
    # 留空时使用 <fullname>-headless
    headlessServiceName: ""
    gatewayPort: 8081
    refreshIntervalMs: 5000
  # kube-dns 地址；多数集群默认值即可工作
  resolver: "kube-dns.kube-system.svc.cluster.local"
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  podAnnotations: {}
