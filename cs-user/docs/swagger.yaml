    - slug
    type: object
  internal_handlers.platformUpdateTenantRequest:
    properties:
      display_name:
        type: string
      edition:
        type: string
      email_domains:
        items:
          type: string
        type: array
      features:
        type: string
      limits:
        type: string
      settings:
        type: string
    type: object
  internal_handlers.reissueTokenRequest:
    properties:
      audience:
        description: |-
          Audience overrides the configured default. Empty slice falls back
          to JWTConfig.DefaultAudience; populated slice replaces it.
        items:
          type: string
        type: array
      identity:
        allOf:
        - $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.JWTClaims'
        description: |-
          Identity carries the parsed Casdoor JWT claims. Optional — when nil,
          only standard JWT claims + enterprise claims (if any) are emitted.
          Typical Phase A7 callers always pass Identity; the nil path exists
          for refresh-token flows (Phase B) where identity may be cached.
      tenant_id:
        description: |-
          TenantID is reserved for Phase B. Phase A callers pass "default" or
          leave empty; the service falls back to "default".
        type: string
      tenant_slug:
        description: |-
          TenantSlug is the URL-friendly tenant key (Phase B). Forwarded by
          server's RPCWriter from the request ctx (set by Try 1 subdomain or
          Try 2 email-domain resolution in the OAuth callback). cs-user embeds
          this verbatim in the signed JWT so server's TenantMatch middleware
          can compare against the runtime-resolved slug without a per-request
          slug→tenant_id lookup. Empty for Phase A callers.
        type: string
      user_subject_id:
        description: UserSubjectID is the cs-user user's stable subject_id. Required.
        type: string
    required:
    - user_subject_id
    type: object
  internal_handlers.reissueTokenResponse:
    properties:
      expires_at:
        type: string
      token:
        type: string
    type: object
  internal_handlers.resolveByEmailRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  internal_handlers.setUserStatusRequest:
    properties:
      operator_id:
        type: string
      status:
        type: string
    required:
    - status
    type: object
  internal_handlers.tenantCandidate:
    properties:
      name:
        type: string
      slug:
        type: string
      tenant_id:
        type: string
    type: object
  internal_handlers.tenantConfigRequest:
    properties:
      config_yaml:
        type: string
    required:
    - config_yaml
    type: object
  internal_handlers.transferIdentityRequest:
    properties:
      external_key:
        type: string
      source_user_subject_id:
        description: |-
          SourceUserSubjectID is accepted for forwards compatibility with
          server's signature; cs-user identifies the identity purely by
          external_key.
        type: string
      target_user_subject_id:
        type: string
    required:
    - external_key
    - target_user_subject_id
    type: object
host: localhost:8081
info:
  contact: {}
  description: 'User identity service for the costrict-cloud platform (Phase 1: user
    CRUD + read-through RPC).'
  title: cs-user API
  version: "1.0"
paths:
  /.well-known/jwks:
    get:
      description: Exposes cs-user's RSA public signing key(s) so relying parties
        (server) can verify cs-user-issued JWTs. Public — RFC 7517 permits; public
        keys aren't secrets. Returns 503 when signing is not configured (CS_USER_JWT_SIGNING_KEY_PATH
        unset).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_auth.JWKS'
        "503":
          description: Service Unavailable
          schema:
            properties:
              error:
                type: string
            type: object
      summary: JWKS endpoint
      tags:
      - jwks
  /api/idp-sources:
    post:
      consumes:
      - application/json
      description: Creates a new identity provider source configuration for a tenant
      parameters:
      - description: IdP source creation parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_idp.CreateParams'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_idp.IdPSourceView'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Create an IdP source for a tenant
      tags:
      - idp-sources
  /api/idp-sources/{tenant_id}:
    get:
      consumes:
      - application/json
      description: Retrieves all IdP source configurations for a tenant
      parameters:
      - description: Tenant identifier
        in: path
        name: tenant_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_idp.IdPSourceView'
            type: array
      summary: List all IdP sources for a tenant
      tags:
      - idp-sources
  /api/idp-sources/{tenant_id}/{provider}:
    delete:
      consumes:
      - application/json
      description: Removes an IdP source configuration
      parameters:
      - description: Tenant identifier
        in: path
        name: tenant_id
        required: true
        type: string
      - description: Provider name
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Delete an IdP source
      tags:
      - idp-sources
    get:
      consumes:
      - application/json
      description: Retrieves a specific IdP source by tenant and provider
      parameters:
      - description: Tenant identifier
        in: path
        name: tenant_id
        required: true
        type: string
      - description: Provider name
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_idp.IdPSourceView'
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Get an IdP source
      tags:
      - idp-sources
    put:
      consumes:
      - application/json
      description: Updates an existing IdP source configuration
      parameters:
      - description: Tenant identifier
        in: path
        name: tenant_id
        required: true
        type: string
      - description: Provider name
        in: path
        name: provider
        required: true
        type: string
      - description: IdP source update parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_idp.UpdateParams'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_idp.IdPSourceView'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Update an IdP source
      tags:
      - idp-sources
  /api/idp-sources/{tenant_id}/enabled:
    get:
      consumes:
      - application/json
      description: Returns all enabled IdP sources for a tenant, filtered by provider_mapping
      parameters:
      - description: Tenant identifier
        in: path
        name: tenant_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_idp.IdPSourceView'
            type: array
      summary: Get enabled IdP sources for login
      tags:
      - idp-sources
  /api/internal/idp-sources/{tenant_id}/{provider}:
    get:
      description: Server-to-server endpoint. Returns raw config including client_secret.
        Must be behind X-Internal-Token gate.
      parameters:
      - description: Tenant identifier
        in: path
        name: tenant_id
        required: true
        type: string
      - description: Provider name
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_idp.InternalIdPSourceView'
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Get single IdP source WITH secrets (internal only)
      tags:
      - idp-sources-internal
  /api/internal/idp-sources/{tenant_id}/enabled:
    get:
      description: Server-to-server endpoint. Returns raw config including client_secret,
        bind_password, etc. Must be behind X-Internal-Token gate.
      parameters:
      - description: Tenant identifier
        in: path
        name: tenant_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_idp.InternalIdPSourceView'
            type: array
      summary: Get enabled IdP sources WITH secrets (internal only)
      tags:
      - idp-sources-internal
  /api/internal/ping:
    get:
      description: Returns pong. Used by costrict-web to verify the X-Internal-Token
        handshake at startup. Requires the shared secret.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              pong:
                type: boolean
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Internal handshake
      tags:
      - internal
  /api/internal/platform/audit-logs:
    get:
      description: 'Returns paginated audit-log entries. Platform-admin scope sees
        all tenants; pass tenant_id to narrow. Filters: action / actor_subject_id
        / target_type / target_id / from / to (ISO8601) / limit (default 100, cap
        500) / offset (default 0). Newest first.'
      parameters:
      - description: Exact tenant_id match
        in: query
        name: tenant_id
        type: string
      - description: Exact actor_subject_id match
        in: query
        name: actor_subject_id
        type: string
      - description: Exact action match (e.g. tenant.create, user.status_changed)
        in: query
        name: action
        type: string
      - description: Exact target_type match (e.g. tenant, user)
        in: query
        name: target_type
        type: string
      - description: Exact target_id match
        in: query
        name: target_id
        type: string
      - description: ISO8601 lower bound on created_at (inclusive)
        in: query
        name: from
        type: string
      - description: ISO8601 upper bound on created_at (inclusive)
        in: query
        name: to
        type: string
      - description: Page size (default 100, cap 500)
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_auditlog.ListResult'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: List audit-log entries (platform-admin, cross-tenant)
      tags:
      - platform-audit-logs
  /api/internal/platform/tenants:
    get:
      description: Returns a paginated list of tenants (newest first). Optional status
        filter narrows to one of active / suspended / deleted. Limit defaults to 100
        (capped at 500); offset defaults to 0.
      parameters:
      - description: Page size (default 100, max 500)
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        in: query
        name: offset
        type: integer
      - description: 'Filter by status: active | suspended | deleted'
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
