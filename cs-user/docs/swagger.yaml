basePath: /
definitions:
  github_com_costrict_costrict-web_cs-user_internal_models.BindIdentityOptions:
    properties:
      force_rebind:
        type: boolean
    type: object
  github_com_costrict_costrict-web_cs-user_internal_models.JWTClaims:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      owner:
        type: string
      phone:
        type: string
      picture:
        type: string
      preferred_username:
        type: string
      provider:
        type: string
      provider_user_id:
        type: string
      sub:
        type: string
      universal_id:
        type: string
    type: object
  github_com_costrict_costrict-web_cs-user_internal_models.User:
    properties:
      auth_provider:
        type: string
      avatar_url:
        type: string
      casdoor_id:
        type: string
      casdoor_sub:
        type: string
      casdoor_universal_id:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      external_key:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      last_login_at:
        type: string
      last_sync_at:
        type: string
      organization:
        type: string
      phone:
        type: string
      provider_user_id:
        type: string
      status:
        type: string
      subject_id:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  github_com_costrict_costrict-web_cs-user_internal_models.UserAuthIdentity:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      explicitly_unbound:
        type: boolean
      external_key:
        type: string
      external_subject:
        type: string
      external_user_id:
        type: string
      id:
        type: integer
      is_primary:
        type: boolean
      issuer:
        type: string
      last_login_at:
        type: string
      organization:
        type: string
      phone:
        type: string
      provider:
        type: string
      provider_user_id:
        type: string
      updated_at:
        type: string
      user_subject_id:
        type: string
    type: object
  internal_handlers.bindIdentityRequest:
    properties:
      claims:
        $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.JWTClaims'
      options:
        $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.BindIdentityOptions'
    required:
    - claims
    type: object
  internal_handlers.byIDsRequest:
    properties:
      ids:
        items:
          type: string
        maxItems: 500
        minItems: 1
        type: array
    required:
    - ids
    type: object
  internal_handlers.transferIdentityRequest:
    properties:
      external_key:
        type: string
      source_user_subject_id:
        description: |-
          SourceUserSubjectID is accepted for forwards compatibility with
          server's signature; cs-user identifies the identity purely by
          external_key.
        type: string
      target_user_subject_id:
        type: string
    required:
    - external_key
    - target_user_subject_id
    type: object
host: localhost:8081
info:
  contact: {}
  description: 'User identity service for the costrict-cloud platform (Phase 1: user
    CRUD + read-through RPC).'
  title: cs-user API
  version: "1.0"
paths:
  /api/internal/ping:
    get:
      description: Returns pong. Used by costrict-web to verify the X-Internal-Token
        handshake at startup. Requires the shared secret.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              pong:
                type: boolean
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Internal handshake
      tags:
      - internal
  /api/internal/users/{subject_id}:
    get:
      description: Returns the user record matching the given subject_id. 404 when
        not found. Internal-only — requires the shared secret.
      parameters:
      - description: User subject_id (stable application-level identifier)
        in: path
        name: subject_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.User'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Get a user by subject_id
      tags:
      - users
  /api/internal/users/{subject_id}/auth-identities:
    get:
      description: Returns every external login identity bound to the user, ordered
        so the primary identity surfaces first. Empty list when the user has none.
      parameters:
      - description: User subject_id
        in: path
        name: subject_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              identities:
                items:
                  $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.UserAuthIdentity'
                type: array
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: List a user's auth identities
      tags:
      - auth-identities
  /api/internal/users/{subject_id}/bind-identity:
    post:
      consumes:
      - application/json
      description: Idempotent bind. Recovers soft-deleted identities instead of duplicating.
        Re-binding an explicitly-unbound identity requires options.force_rebind.
      parameters:
      - description: Target user subject_id
        in: path
        name: subject_id
        required: true
        type: string
      - description: Claims to bind + optional BindIdentityOptions
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.bindIdentityRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Bind an identity to a user
      tags:
      - users
  /api/internal/users/{subject_id}/identities/{provider}:
    delete:
      description: Soft-deletes every identity matching the provider on the user and
        marks them explicitly_unbound. Refuses to unbind the user's last identity.
        Promotes the next best-rank identity to primary if the unbind removed the
        primary.
      parameters:
      - description: User subject_id
        in: path
        name: subject_id
        required: true
        type: string
      - description: Provider to unbind (e.g. github, phone, idtrust)
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Unbind all identities for a provider
      tags:
      - users
  /api/internal/users/by-ids:
    post:
      consumes:
      - application/json
      description: Returns a subject_id → user map. Missing IDs are silently omitted;
        callers compare lengths to detect partial misses. Capped at 500 IDs per request.
      parameters:
      - description: Subject IDs to resolve
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.byIDsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              users:
                additionalProperties:
                  $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.User'
                type: object
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Batch-resolve users by subject_id
      tags:
      - users
  /api/internal/users/get-or-create:
    post:
      consumes:
      - application/json
      description: Idempotent upsert driven by the OAuth callback's parsed JWT claims.
        Multi-lookup strategy (external_key → universal_id → casdoor_id → sub → username).
        Creates a primary identity row when a new user is created.
      parameters:
      - description: JWT claim payload (parsed — cs-user does not verify JWT signatures;
          the X-Internal-Token middleware authenticates the caller)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.JWTClaims'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.User'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Upsert user from JWT claims (login entry point)
      tags:
      - users
  /api/internal/users/search:
    get:
      description: Returns active users whose username / display_name / email match
        the keyword (LIKE %keyword%). Limit defaults to 50, capped at 200.
      parameters:
      - description: Search keyword (matched against username / display_name / email)
        in: query
        name: keyword
        type: string
      - description: Max results (default 50, max 200)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              users:
                items:
                  $ref: '#/definitions/github_com_costrict_costrict-web_cs-user_internal_models.User'
                type: array
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Search active users
      tags:
      - users
  /api/internal/users/transfer-identity:
    post:
      consumes:
      - application/json
      description: Account-merge primitive. Moves the identity identified by external_key
        to the target user. No-op if the target already owns it.
      parameters:
      - description: Transfer target + identity key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.transferIdentityRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - InternalToken: []
      summary: Transfer an identity to another user
      tags:
      - users
  /healthz:
    get:
      description: Always returns 200 once the process is up. Unauthenticated — safe
        for K8s livenessProbe.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              status:
                type: string
            type: object
      summary: Liveness probe
      tags:
      - health
  /readyz:
    get:
      description: Returns 200 when the readiness checker (Postgres ping in P0-2)
        passes; 503 otherwise. Unauthenticated — safe for K8s readinessProbe. The
        handler is built by a factory bound to the supplied checker; swag uses the
        @Router path to register this endpoint.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              status:
                type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            properties:
              error:
                type: string
              status:
                type: string
            type: object
      summary: Readiness probe
      tags:
      - health
securityDefinitions:
  InternalToken:
    description: Shared secret for service-to-service calls from costrict-web (ADR
      D8).
    in: header
    name: X-Internal-Token
    type: apiKey
swagger: "2.0"
