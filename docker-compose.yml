services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: costrict-postgres
    environment:
      POSTGRES_USER: costrict
      POSTGRES_PASSWORD: costrict_password
      POSTGRES_DB: costrict_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costrict"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Casdoor 认证服务
  casdoor:
    image: casbin/casdoor:latest
    container_name: costrict-casdoor
    ports:
      - "8000:8000"
    environment:
      RUNNING_IN_DOCKER: "true"
      DRIVER: "postgres"
      SQL_USERNAME: "costrict"
      SQL_PASSWORD: "costrict_password"
      SQL_HOST_NAME: "postgres"
      SQL_PORT: "5432"
      SQL_DB_NAME: "costrict_db"
      CREATOR: "admin"
      PASSWORD: "123"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - casdoor_conf:/conf

volumes:
  postgres_data:
  casdoor_conf:
